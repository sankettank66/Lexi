name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to release (e.g. v1.2.0). Leave empty to only build.'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v6
        with:
          name: lexi-build
          path: |
            dist/
            icons/
            background.js
            src/lib/
            src/options/
            src/popup/
            manifest.json
          if-no-files-found: error

  release:
    if: |
      startsWith(github.ref, 'refs/tags/v')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lexi-build
          path: lexi-build
      - run: |
          cd lexi-build
          zip -r ../lexi-extension.zip .
      - name: Resolve release tag
        id: tag
        run: echo "tag=${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.tag.outputs.tag }}
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: .github/release-template.md
          fail_on_unmatched_files: true
          files: lexi-extension.zip
